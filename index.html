                    <button id="f-c" class="convtbtn">°F-°C</button>
                    <button id="k-m" class="convtbtn" style="grid-column:1;">Km-Mi</button>
                    <button id="c-f" class="convtbtn" style="grid-column:2;">°C-°F</button>
                </div>
            </div>
            <div id="calcwindow">
                <p id="closcalc" class="closeX">X</p>
                <p id="calc-header" class="window-header">Calculator</p>
                <div class="display">
                    <input type="text" id="calcdisplay" name="display" readonly style="font-size: 45px;">
                </div>
                
                <div id="num-grid">
                    <button id="convert" class="op" style="width:50px; height: 50px; border-radius: 20px; font-size: 35px; grid-column:1;">&harr;</button>
                    <button id="clear" class="op" style="width:50px; height: 50px; border-radius: 20px; font-size: 35px; grid-column: 2;">C</button>
                    <button id="delete" class="op" style="width:50px; height: 50px; border-radius: 20px; font-size: 35px; grid-column:3;">⌫</button>
                    <button id="div" class="op" style="width:50px; height: 50px; border-radius: 20px; font-size: 35px;">&divide;</button>

                    <button id="b1" class="nums" style="grid-column:1;">1</button>
                    <button id="b2" class="nums">2</button>
                    <button id="b3" class="nums">3</button>
                    <button id="mult" class="op" style="width:50px; height: 50px; border-radius: 20px; font-size: 35px;">&times;</button>

                    <button id="b4" class="nums">4</button>
                    <button id="b5" class="nums">5</button>
                    <button id="b6" class="nums">6</button>
                    <button id="add" class="op" style="width:50px; height: 50px; border-radius: 20px; font-size: 35px;">+</button>

                    <button id="b7" class="nums">7</button>
                    <button id="b8" class="nums">8</button>
                    <button id="b9" class="nums">9</button>
                    <button id="sub" class="op" style="width:50px; height: 50px; border-radius: 20px; font-size: 35px;">-</button>
                    <button id="dot" class="nums" style="width:50px; height: 50px; border-radius: 20px; font-size: 45px;">.</button>
                    <button id="b0" class="nums" style="grid-column:2;">0</button>
                    <button id="equal" class="op" style="width: 110px; height: 50px; border-radius: 20px; font-size: 35px; grid-column: span 2;">=</button>
                    
                </div>
            </div>

            <div id="gamewindow">
                <p id="closgame" class="closeX">X</p>
                <p id="game-header" class="window-header">Game!</p>
                <div id="gameCanvas">
                    <canvas id="raceCanvas" width="600" height="475"></canvas>
                    <canvas id="hidCanvas" width ="600" height = "475"></canvas>
                </div>
            </div>

        <script src="script.js">

        </script>
    </body>
</html>
